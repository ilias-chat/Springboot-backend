spring.application.name=dwsc-backend
server.port=${PORT:8080}

# Optional local overrides (gitignored) — copy application-local.properties.example
spring.config.import=optional:classpath:application-local.properties

# Firebase Admin (same env var as TRWM-backend). Required for /api/users/* unless disabled below.
# dwsc.security.firebase.enabled=false

dwsc.security.firebase.enabled=true

# --- PostgreSQL (e.g. Cloud SQL public IP) ---
# Prefer setting these via environment variables or application-local.properties (gitignored).
# Cloud SQL: add ?sslmode=require to the JDBC URL unless you use the Cloud SQL connector.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/dwsc}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:dwsc}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:dwsc}

spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

logging.level.org.hibernate.SQL=WARN

# OpenAPI / Swagger UI (same paths as TRWM-backend Node app)
springdoc.api-docs.path=/api/docs.json
springdoc.swagger-ui.path=/api/docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
