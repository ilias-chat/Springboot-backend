spring:
  application:
    name: dwsc-player
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/dwsc_players}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:0511}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  cloud:
    openfeign:
      client:
        config:
          dwsc-comment:
            url: ${COMMENT_SERVICE_URL:}

server:
  port: ${PORT:8081}
  forward-headers-strategy: framework

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    non-secure-port-enabled: false
    secure-port-enabled: true
    secure-port: 443

dwsc:
  security:
    firebase:
      enabled: true

corba:
  news:
    host: ${CORBA_NEWS_HOST:127.0.0.1}
    port: ${CORBA_NEWS_PORT:1050}
    serviceName: ${CORBA_NEWS_SERVICE_NAME:NewsService}

api-football:
  base-url: https://v3.football.api-sports.io

springdoc:
  api-docs:
    path: /api/docs.json
  swagger-ui:
    path: /api/docs
    operationsSorter: method
    tagsSorter: alpha

logging:
  level:
    org.hibernate.SQL: WARN

