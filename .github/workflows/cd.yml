# CD: build Docker image → Docker Hub → Google Cloud Run
#
# GitHub secret/variable names match TRWM-backend (Node) `.github/workflows/cd.yml`:
#
# Secrets (Settings → Secrets and variables → Actions → Secrets):
#   DOCKERHUB_USERNAME   Docker Hub namespace (username or org)
#   DOCKERHUB_TOKEN      Docker Hub Access Token (Read & Write) — paste as ONE line, no quotes, no trailing newline
#   GCP_SA_KEY           Service account JSON key for deploying to Cloud Run
# You can store GCP + repo name as either Secrets or Variables. This workflow reads
# Secrets first (matches common setups), then falls back to Variables.
#
#   GCP_PROJECT_ID       GCP project ID (e.g. my-project-123)
#   GCP_REGION           e.g. europe-west1
#   CLOUD_RUN_SERVICE    Cloud Run service name
#   DOCKERHUB_REPO       Docker Hub image repository name (defaults to dwsc-backend)
#
# Optional (same names as Node; not written to Cloud Run by this workflow until you add env merge):
#   MONGO_URI, FIREBASE_SERVICE_ACCOUNT_JSON, API_FOOTBALL_KEY
#
# Spring listens on PORT; Cloud Run is deployed with --port=8080.

name: CD

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOCKERHUB_REPO_NAME: ${{ secrets.DOCKERHUB_REPO || vars.DOCKERHUB_REPO || 'dwsc-backend' }}
  GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }}
  GCP_REGION_NAME: ${{ secrets.GCP_REGION || vars.GCP_REGION }}
  CLOUD_RUN_NAME: ${{ secrets.CLOUD_RUN_SERVICE || vars.CLOUD_RUN_SERVICE }}

jobs:
  test:
    name: Test (Maven)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests
        run: mvn -B verify

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Cloud Run configuration
        run: |
          set -euo pipefail
          if [ -z "${GCP_PROJECT:-}" ] || [ -z "${GCP_REGION_NAME:-}" ] || [ -z "${CLOUD_RUN_NAME:-}" ]; then
            echo "::error::Set GCP_PROJECT_ID, GCP_REGION, and CLOUD_RUN_SERVICE (repository Secrets and/or Variables — same names as TRWM-backend)."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          user=$(printf '%s' "$DOCKERHUB_USERNAME" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          token=$(printf '%s' "$DOCKERHUB_TOKEN" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ -z "$user" ] || [ -z "$token" ]; then
            echo "::error::DOCKERHUB_USERNAME or DOCKERHUB_TOKEN is empty. Add both under Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "DOCKERHUB_USER=$user" >> "$GITHUB_ENV"
          printf '%s' "$token" | docker login -u "$user" --password-stdin docker.io

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_USER }}/${{ env.DOCKERHUB_REPO_NAME }}:latest
            ${{ env.DOCKERHUB_USER }}/${{ env.DOCKERHUB_REPO_NAME }}:${{ github.sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.CLOUD_RUN_NAME }}
          region: ${{ env.GCP_REGION_NAME }}
          project_id: ${{ env.GCP_PROJECT }}
          image: ${{ env.DOCKERHUB_USER }}/${{ env.DOCKERHUB_REPO_NAME }}:${{ github.sha }}
          flags: --allow-unauthenticated --port=8080
