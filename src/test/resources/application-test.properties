spring.datasource.url=jdbc:h2:mem:dwsc_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Skip Firebase filter + bean in tests (no real GCP / JWT)
dwsc.security.firebase.enabled=false

# No Swagger UI needed in CI unit tests
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
