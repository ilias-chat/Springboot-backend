# Continuous integration: Maven tests on PRs and on pushes to branches other than main/master.
# Pushes to main/master are handled by cd.yml (test + deploy).
name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches-ignore:
      - main
      - master

permissions:
  contents: read

jobs:
  test:
    name: Test (Maven)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests
        run: mvn -B verify -Dspring.profiles.active=test
