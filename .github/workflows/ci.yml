# Continuous integration: Maven tests on PRs and on pushes to non-main branches.
# Pushes to `main` are handled by deploy-cloud-run.yml (test + deploy).
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test (Maven)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests
        run: mvn -B verify
