# Continuous delivery: test, build Docker image, push to Artifact Registry, deploy to Cloud Run.
# Triggers: push to `main`, or manual workflow dispatch (deploy only runs when the ref is `main`).
#
# One-time GCP + GitHub setup: docs/google-cloud-run.md
name: Deploy (Cloud Run)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_REGION: ${{ vars.GCP_REGION || 'europe-west1' }}
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY || 'dwsc' }}
  CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE || 'dwsc-backend' }}

jobs:
  test:
    name: Test (Maven)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests
        run: mvn -B verify

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Check GCP configuration
        run: |
          if [ -z "$GCP_PROJECT_ID" ]; then
            echo "::error::Set GitHub repository Variable GCP_PROJECT_ID (and auth secrets — see docs/google-cloud-run.md)."
            exit 1
          fi
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build and push image
        id: image
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY_REPOSITORY}/${CLOUD_RUN_SERVICE}:${GITHUB_SHA}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.CLOUD_RUN_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ steps.image.outputs.image }}
          flags: "--allow-unauthenticated --port=8080"
          # Add env/secrets after you create them in Cloud Run or Secret Manager, for example:
          # env_vars: |-
          #   SPRING_PROFILES_ACTIVE=prod
          #   SPRING_DATASOURCE_URL=${{ vars.SPRING_DATASOURCE_URL }}
          # secrets: |-
          #   SPRING_DATASOURCE_PASSWORD=projects/PROJECT_ID/secrets/dwsc-db-password/versions/latest
